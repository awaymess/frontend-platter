name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        env:
          BASE_URL: http://127.0.0.1:3000
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          for i in {1..60}; do
            if curl -fsS "$BASE_URL/th/login" > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS "$BASE_URL/th/login" > /dev/null
          npm run test:e2e
